name: openeco
version: "${version}"
main: dev.alexisbinh.openeco.OpenEcoPlugin
description: "Just a simple economy plugin"
api-version: '1.20'
folia-supported: true
authors:
  - alexisbinh
provides:
  - OpenEco

libraries:
  - org.xerial:sqlite-jdbc:3.51.3.0
  - com.h2database:h2:2.4.240

depend:
  - Vault

softdepend:
  - PlaceholderAPI

channels:
  - openeco:sync

load-before:
  - ShopGUIPlus

commands:
  balance:
    description: Check your or another player's balance
    usage: /balance [player] [currency]
    aliases: [bal, money]
  baltop:
    description: View the richest players
    usage: /baltop [page] [currency]
    aliases: [balancetop, moneytop]
  pay:
    description: Pay another player
    usage: /pay <player> <amount> [currency]
  eco:
    description: Economy administration
    usage: /eco <give|take|set|reset|delete|freeze|unfreeze|reload> <player> [amount] [currency]
    aliases: [economy]
  history:
    description: View transaction history
    usage: /history [self|player] [page] [currency]
    aliases: [txhistory, ecohistory]

permissions:
  openeco.admin:
    description: Wildcard for all admin economy permissions
    default: op
    children:
      openeco.command.eco.give: true
      openeco.command.eco.take: true
      openeco.command.eco.set: true
      openeco.command.eco.reset: true
      openeco.command.eco.delete: true
      openeco.command.eco.freeze: true
      openeco.command.eco.unfreeze: true
      openeco.command.eco.rename: true
      openeco.command.eco.reload: true
      openeco.command.balance.others: true
      openeco.command.history.others: true
  openeco.command.balance:
    description: Check own balance
    default: true
  openeco.command.balance.others:
    description: Check other players' balance
    default: op
  openeco.command.baltop:
    description: View the balance top list
    default: true
  openeco.command.pay:
    description: Pay another player
    default: true
  openeco.command.eco.give:
    description: Give money to a player
    default: op
  openeco.command.eco.take:
    description: Take money from a player
    default: op
  openeco.command.eco.set:
    description: Set a player's balance
    default: op
  openeco.command.eco.reload:
    description: Reload openeco configuration
    default: op
  openeco.command.eco.reset:
    description: Reset a player's balance to starting balance
    default: op
  openeco.command.eco.delete:
    description: Delete a player's current economy account and own history
    default: op
  openeco.command.eco.freeze:
    description: Freeze a player's economy account
    default: op
  openeco.command.eco.unfreeze:
    description: Unfreeze a player's economy account
    default: op
  openeco.command.eco.rename:
    description: Rename a player's economy account display name
    default: op
  openeco.command.history:
    description: View own transaction history
    default: true
  openeco.command.history.others:
    description: View other players' transaction history
    default: op
