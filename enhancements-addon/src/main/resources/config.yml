# OpenEcoEnhancements — default config

# ── Interest ─────────────────────────────────────────────────────────────────
interest:
  # Set to true to enable automatic interest payments.
  enabled: false

  # Annual interest rate in percent (e.g. 5.0 = 5% per year).
  # The amount credited each interval is: balance * rate / 100 / (seconds-per-year / interval-seconds)
  rate: 5.0

  # How often interest is credited, in seconds.
  # Default: 3600 (every hour).
  interval-seconds: 3600
  # Optional currency id. Leave blank to use OpenEco's default currency.
  currency: ""

  # Minimum balance required to receive interest.
  # Accounts below this threshold are skipped.
  min-balance: 0

  # Maximum interest credited per interval (0 = unlimited).
  max-per-interval: 0

  # Transaction source tag written to history entries.
  source: "interest"

# ── Pay Limit ────────────────────────────────────────────────────────────────
pay-limit:
  # Set to true to enforce a rolling-window pay limit per player.
  enabled: false

  # Maximum total amount a single player may send via /pay within the window.
  max-amount: 10000

  # Length of the rolling window in seconds.
  # Default: 86400 (24 hours / 1 day).
  window-seconds: 86400

  # Message sent when the limit is exceeded.
  # Supports MiniMessage tags.
  message: "<red>You have reached your daily pay limit of <yellow><limit><red>. Resets in <yellow><remaining><red>."

# ── Permission Balance Cap ────────────────────────────────────────────────────
perm-cap:
  # Set to true to enforce addon-side balance ceilings based on permissions.
  # This listener cannot raise OpenEco's own currency max-balance.
  # If you want a player to hold more, raise the matching currency max-balance in OpenEco too.
  # Only online-player operations that reach these addon listeners are affected.
  # Startup warnings are logged for any tier that sits above the configured core currency limit.
  enabled: false

  # List of permission → cap pairs.
  # All matching permissions are considered and the highest matching tier is used.
  # The effective limit is still bounded by OpenEco's own per-currency max-balance.
  # Players without any matching permission fall back to OpenEco's per-currency max-balance.
  tiers:
    - permission: openeco.cap.vip
      cap: 500000
    - permission: openeco.cap.mvp
      cap: 2000000

# ── Currency Exchange ─────────────────────────────────────────────────────────
exchange:
  # Set to true to enable the /exchange command.
  enabled: false

  # Optional flat fee percentage deducted from the received amount (0 = no fee).
  # Example: fee-percent: 2.5 means the player receives 2.5% less than the raw rate gives.
  fee-percent: 0.0

  # List of directional exchange rates.
  # Each entry defines how much of the 'to' currency is given per 1 unit of 'from'.
  # Rates are NOT automatically reversible — add both directions explicitly if needed.
  rates:
    - from: openeco
      to: gems
      rate: 10.0
    # - from: gems
    #   to: openeco
    #   rate: 0.09

  messages:
    usage: "<red>Usage: /exchange <amount> <from> <to>"
    success: "<green>Exchanged <yellow><from_amount></yellow> for <yellow><to_amount></yellow>."
    no-rate: "<red>No exchange rate configured for that currency pair."
    unknown-currency: "<red>Unknown currency: <yellow><currency>"
    same-currency: "<red>Cannot exchange a currency for itself."
    insufficient-funds: "<red>Insufficient funds."
    balance-limit: "<red>Exchange would exceed your balance limit."
    frozen: "<red>Your account is frozen."
    invalid-amount: "<red>Invalid amount."
    failed: "<red>Exchange failed."
    rollback-failed: "<red>Exchange failed and automatic rollback could not be completed. Contact an administrator."
